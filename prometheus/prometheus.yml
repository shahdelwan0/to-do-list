global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "todo-app-monitor"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/alerts.yml"

# Scrape configurations
scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "todo-app"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["todo-app:8082"]
        labels:
          app: "todo-app"
          environment: "production"

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
