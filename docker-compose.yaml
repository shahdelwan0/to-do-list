services:
  todo-app:
    image: todo_app:latest
    build: .
    container_name: todo_app
    ports:
      - "8082:8082"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8082/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9091}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - todo-app
      - alertmanager
      - cadvisor
    restart: unless-stopped
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        sed -e "s|__SLACK_WEBHOOK_URL__|$${SLACK_WEBHOOK_URL}|g" -e "s|__TELEGRAM_BOT_TOKEN__|$${TELEGRAM_BOT_TOKEN}|g" -e "s|__TELEGRAM_CHAT_ID__|$${TELEGRAM_CHAT_ID}|g" /etc/alertmanager/alertmanager.yml.tmpl > /tmp/alertmanager.yml && \
        /bin/alertmanager --config.file=/tmp/alertmanager.yml
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-http://127.0.0.1:9/webhook-placeholder}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-000000000:placeholder_token}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-1}
    restart: unless-stopped
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "${CADVISOR_PORT:-8085}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge
